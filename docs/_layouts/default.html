<!doctype html>
<html lang="{{ site.lang | default: "en-GB" }}">
<head>
    <!-- Google tag (gtag.js) - Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9DX4ZNSG3R"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9DX4ZNSG3R');
    </script>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    {% seo %}
    <meta name="description" content="{{ site.description }}">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#364F29">
    <meta name="msapplication-TileColor" content="#364F29">
    <meta name="theme-color" content="#364F29">

    <style>
        body { background: url(/background-image.png) no-repeat center fixed; background-size: cover; }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-inner">
            <a class="nav-brand" href="/">FTAnalyzer</a>
            <ul class="nav-links" id="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/Documentation">Documentation</a></li>
                <li><a href="/guides">PDF Guides</a></li>
                <li><a href="/releases">Releases</a></li>
                <li><a href="https://app.ftanalyzer.com" class="nav-webapp" target="_blank" rel="noopener">Web App ↗</a></li>
                <li><a href="https://github.com/ShammyLevva/FTAnalyzer" target="_blank" rel="noopener">GitHub</a></li>
            </ul>
            <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.getElementById('nav-links').classList.toggle('open')">&#9776;</button>
        </div>
    </nav>

    <div class="wrapper">
        <header>
            <h1 class="title">{{ site.title }}</h1>
            <p class="tagline">{{ site.description }}</p>
        </header>

        <div id="container">
            <div id="main" role="main">
                <article class="markdown-body">
                    {{ content }}
                </article>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="/">Home</a>
                <a href="/Documentation">Documentation</a>
                <a href="/guides">PDF Guides</a>
                <a href="https://app.ftanalyzer.com" target="_blank" rel="noopener">Web App</a>
                <a href="/privacy">Privacy Policy</a>
                <a href="https://www.facebook.com/FTAnalyzer" target="_blank" rel="noopener">Facebook Support</a>
                <a href="https://www.facebook.com/groups/ftanalyzer" target="_blank" rel="noopener">User Group</a>
                <a href="https://github.com/ShammyLevva/FTAnalyzer" target="_blank" rel="noopener">GitHub</a>
            </div>
            <div class="footer-creds">
                <small>&copy; Alexander Bisset &middot; Built with <a href="https://pages.github.com/">GitHub Pages</a></small>
            </div>
        </footer>
    </div>

</body>
</html>
